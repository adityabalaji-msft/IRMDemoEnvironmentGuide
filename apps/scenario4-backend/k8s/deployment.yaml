# =============================================================================
# Scenario 4 — Backend Deployment & Service
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
    scenario: scenario4-aks
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        scenario: scenario4-aks
    spec:
      serviceAccountName: scenario4-sa
      # Schedule workload pods on the user node pool
      nodeSelector:
        workload: app
      # Ensure pods are spread across availability zones
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: backend
      containers:
        - name: backend
          # Replace with your ACR image after building:
          # <registry>.azurecr.io/scenario4-backend:latest
          image: zrdemoacr2.azurecr.io/scenario4-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            # Config values (SQL server, database name)
            - configMapRef:
                name: backend-config
          env:
            # SQL password from K8s secret
            - name: SQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: password
            # Application Insights
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: appinsights-secret
                  key: connectionString
            # Pod metadata for telemetry
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

---
# PodDisruptionBudget ensures at least 1 backend pod stays running during disruptions
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: default
  labels:
    app: backend
    scenario: scenario4-aks
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP  # Internal only — frontend accesses via K8s DNS
